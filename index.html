<!DOCTYPE html><html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Enhanced Racing Game</title>
<style>
  :root{--ui-bg: rgba(0,0,0,0.6);--accent:#0af;--danger:#e53e3e}
  html,body{height:100%;margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:#000}
  .wrap{height:100vh;display:flex;align-items:center;justify-content:center}
  canvas{background:#111;display:block;border-radius:8px}
  /* UI overlays */
  .ui{position:absolute;left:50%;transform:translateX(-50%);top:12px;color:#fff;width:420px;max-width:94%;pointer-events:none}
  .scorebar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px}
  .badge{background:var(--ui-bg);padding:6px 10px;border-radius:8px;font-weight:600}
  /* start / gameover screens */
  .overlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);padding:18px;border-radius:10px;text-align:center;color:#fff;min-width:260px}
  .btn{appearance:none;border:0;padding:10px 18px;border-radius:8px;background:var(--accent);color:#022;cursor:pointer;font-weight:700;pointer-events:auto}
  .btn.secondary{background:#444;color:#fff}
  .small{font-size:14px;color:#ddd}
  /* touch controls */
  .touch-controls{position:absolute;left:50%;transform:translateX(-50%);bottom:12px;display:flex;gap:16px;pointer-events:none}
  .touch-btn{width:80px;height:48px;border-radius:10px;background:var(--ui-bg);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;pointer-events:auto}
  .touch-half{position:absolute;left:0;right:0;top:0;bottom:0}
  /* responsive */
  @media (max-width:480px){ .touch-btn{width:120px;height:56px} .ui{width:92%} }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="game" width="400" height="400"></canvas>
  <div class="ui" aria-hidden="true">
    <div class="scorebar">
      <div class="badge" id="score">Score: 0</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="badge small">High: <span id="highScore">0</span></div>
        <button id="muteBtn" class="btn secondary" style="pointer-events:auto">Mute</button>
      </div>
    </div>
  </div>  <!-- start overlay -->  <div id="startScreen" class="overlay">
    <h2 style="margin:8px 0">Simple Racing</h2>
    <p class="small">Dodge incoming cars. Swipe or use arrows. Built-in sound, animations, and high score.</p>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
      <button id="playBtn" class="btn">Play</button>
      <button id="howBtn" class="btn secondary">How</button>
    </div>
  </div>  <!-- game over overlay (hidden) -->  <div id="gameOverScreen" class="overlay" style="display:none">
    <h2 id="goTitle">GAME OVER</h2>
    <p class="small">Score: <strong id="finalScore">0</strong></p>
    <p class="small">Best: <strong id="finalHigh">0</strong></p>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
      <button id="restartBtn" class="btn">Restart</button>
      <button id="shareBtn" class="btn secondary">Share</button>
    </div>
  </div>  <!-- how to play -->  <div id="howScreen" class="overlay" style="display:none;min-width:300px">
    <h3>How to play</h3>
    <p class="small">Use left/right arrow keys or on-screen buttons. Tap left/right side to move. Avoid other cars — speed increases over time.</p>
    <div style="margin-top:12px"><button id="howClose" class="btn">Close</button></div>
  </div>  <!-- touch controls -->  <div class="touch-controls" style="pointer-events:none">
    <div id="leftTouch" class="touch-btn">◀</div>
    <div id="rightTouch" class="touch-btn">▶</div>
  </div>
</div><script>
/* =========================
   Enhanced Racing Game v1.0
   Features included:
   - HD car sprites (player + multiple enemies)
   - Moving road/lanes animation
   - Explosion particle animation on crash
   - Sound effects (engine, crash, ding)
   - Enemy variations and lane-based movement
   - Mobile touch controls
   - Start screen, How-to screen, Game over screen
   - Difficulty/speed ramp
   - High score saved to localStorage
   ========================= */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// UI elements
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const howScreen = document.getElementById('howScreen');
const playBtn = document.getElementById('playBtn');
const howBtn = document.getElementById('howBtn');
const howClose = document.getElementById('howClose');
const restartBtn = document.getElementById('restartBtn');
const shareBtn = document.getElementById('shareBtn');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('highScore');
const finalScore = document.getElementById('finalScore');
const finalHigh = document.getElementById('finalHigh');
const muteBtn = document.getElementById('muteBtn');
const leftTouch = document.getElementById('leftTouch');
const rightTouch = document.getElementById('rightTouch');

// Assets (you can replace these URLs with your own PNG/ogg files)
const assets = {
  player: 'https://i.imgur.com/fHyEMsl.png', // sample player car
  enemies: [
    'https://i.imgur.com/6o5VgVl.png',
    'https://i.imgur.com/3QZQXQf.png',
    'https://i.imgur.com/C4QXQ9x.png'
  ],
  sounds: {
    engine: 'https://actions.google.com/sounds/v1/transportation/car_accelerate.ogg',
    crash: 'https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg',
    ding: 'https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg',
    click: 'https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg'
  }
};

// Preload images
function loadImage(src){ return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(i);i.src=src})}
let playerImg, enemyImgs=[];

// Sounds
let engineSnd, crashSnd, dingSnd, clickSnd;
let muted=false;

function loadAudio(url){ const a=new Audio(url); a.preload='auto'; return a }

// Game state
let lanes = 3; // number of lanes
let laneX = []; // x positions for lanes (centered)
let laneWidth = 100; // width of each lane
let car = { lane:1, x:0, y:300, w:48, h:72, vx:0 }; // lane 0..lanes-1
let obstacles = [];
let score=0; let speed=2; let spawnTimer=0; let spawnInterval=60; let gameRunning=false;
let highScore = parseInt(localStorage.getItem('racing_high')||'0',10);
highEl.textContent = highScore;

// Road animation
let roadOffset=0;

// Explosion particles
let particles = [];

// Initialize lanes positions based on laneWidth
function computeLanes(){ laneWidth = Math.floor(W / lanes); laneX = []; for(let i=0;i<lanes;i++){ laneX.push(i*laneWidth + (laneWidth - car.w)/2); } }
computeLanes();

// Helper: spawn enemy
function spawnEnemy(){ const lane = Math.floor(Math.random()*lanes); const img = enemyImgs[Math.floor(Math.random()*enemyImgs.length)]; const w=48,h=72; obstacles.push({ lane, x: laneX[lane], y: -h, w, h, img }); }

// Collision detection
function isColliding(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y }

// Explosion
function explodeAt(x,y){ // create particles
  for(let i=0;i<24;i++){ particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-1.5)*6,life:60,size:4+Math.random()*4}) }
}

// Game loop
function update(){ if(!gameRunning) return;
  // speed ramps up with score
  speed = 2 + Math.floor(score/5);
  roadOffset += speed*0.6; if(roadOffset>H) roadOffset-=H;

  // smooth lane movement: animate car.x toward laneX[car.lane]
  const targetX = laneX[car.lane]; car.x += (targetX - car.x) * 0.25;

  // spawn logic
  spawnTimer++;
  const currentSpawnInterval = Math.max(20, 60 - Math.floor(score/3));
  if(spawnTimer > currentSpawnInterval){ spawnTimer=0; if(Math.random()<0.9) spawnEnemy(); }

  // update obstacles
  for(let i=obstacles.length-1;i>=0;i--){ const o=obstacles[i]; o.y += speed + 1; o.x = laneX[o.lane]; if(o.y>H){ obstacles.splice(i,1); score++; if(!muted) dingSnd.play(); scoreEl.textContent = 'Score: '+score; setHighScore(); } else {
      if(isColliding(car,o)){
        // crash
        if(!muted){ engineSnd.pause(); engineSnd.currentTime=0; crashSnd.play(); }
        gameOver(); return;
      }
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; if(p.life<=0) particles.splice(i,1); }
}

function drawRoad(){ // draw two lane dividers and scrolling lane marks
  ctx.fillStyle='#222'; ctx.fillRect(0,0,W,H);
  // center dashed lines
  ctx.fillStyle='#333'; ctx.fillRect(0,0,W,H);
  const lineW = 6;
  ctx.fillStyle='#555';
  for(let i=1;i<lanes;i++){
    const x = i*laneWidth; // divider
    ctx.fillRect(x-2,0,4,H);
  }
  // dashed lane marks
  ctx.strokeStyle='#aaa'; ctx.lineWidth=2; ctx.setLineDash([22,18]); ctx.lineDashOffset = -roadOffset;
  for(let i=0;i<lanes;i++){
    const cx = i*laneWidth + laneWidth/2;
    ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function draw(){ // main draw
  // background road
  drawRoad();

  // draw obstacles
  obstacles.forEach(o=>{
    if(o.img && o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.w, o.h);
    else { ctx.fillStyle='red'; ctx.fillRect(o.x,o.y,o.w,o.h); }
  });

  // draw player
  if(playerImg && playerImg.complete) ctx.drawImage(playerImg, car.x, car.y, car.w, car.h);
  else { ctx.fillStyle='lime'; ctx.fillRect(car.x,car.y,car.w,car.h); }

  // particles
  particles.forEach(p=>{ ctx.fillStyle='orange'; ctx.fillRect(p.x,p.y,p.size,p.size); });

  // HUD is DOM-based; no canvas text required
}

// game over
function gameOver(){ gameRunning = false; // show overlay
  explodeAt(car.x + car.w/2, car.y + car.h/2);
  finalScore.textContent = score; finalHigh.textContent = localStorage.getItem('racing_high')||0;
  gameOverScreen.style.display = 'block';
}

function setHighScore(){ if(score > highScore){ highScore = score; localStorage.setItem('racing_high', String(highScore)); highEl.textContent = highScore; } }

// Input handling
window.addEventListener('keydown', e=>{
  if(!gameRunning) return; if(e.key==='ArrowLeft'){ car.lane = Math.max(0, car.lane-1); if(!muted) clickSnd.play(); }
  if(e.key==='ArrowRight'){ car.lane = Math.min(lanes-1, car.lane+1); if(!muted) clickSnd.play(); }
});

// touch buttons
leftTouch.addEventListener('touchstart', e=>{ e.preventDefault(); if(gameRunning){ car.lane = Math.max(0, car.lane-1); if(!muted) clickSnd.play(); } },{passive:false});
rightTouch.addEventListener('touchstart', e=>{ e.preventDefault(); if(gameRunning){ car.lane = Math.min(lanes-1, car.lane+1); if(!muted) clickSnd.play(); } },{passive:false});

// also support tapping left/right halves of canvas
canvas.addEventListener('touchstart', e=>{
  if(!gameRunning) return;
  const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); const x = t.clientX - rect.left;
  if(x < rect.width/2){ car.lane = Math.max(0, car.lane-1); }
  else { car.lane = Math.min(lanes-1, car.lane+1); }
  if(!muted) clickSnd.play();
},{passive:false});

// Start / restart / UI
playBtn.addEventListener('click', ()=>{ startGame(); if(!muted) clickSnd.play(); });
howBtn.addEventListener('click', ()=>{ howScreen.style.display='block'; startScreen.style.display='none' });
howClose.addEventListener('click', ()=>{ howScreen.style.display='none'; startScreen.style.display='block' });
restartBtn.addEventListener('click', ()=>{ restart(); if(!muted) clickSnd.play(); });
shareBtn.addEventListener('click', ()=>{ const txt = `I scored ${score} points in Simple Racing!`; if(navigator.share){ navigator.share({title:'Simple Racing',text:txt}); } else { prompt('Copy your score:', txt); } });

muteBtn.addEventListener('click', ()=>{ muted=!muted; muteBtn.textContent = muted ? 'Unmute' : 'Mute'; if(muted){ engineSnd.pause(); } else { if(gameRunning) engineSnd.play(); } });

function startGame(){ // reset state
  obstacles=[]; particles=[]; score=0; scoreEl.textContent='Score: 0'; car.lane = 1; car.x = laneX[car.lane]; gameRunning=true; startScreen.style.display='none'; gameOverScreen.style.display='none'; if(!muted){ engineSnd.loop=true; engineSnd.play(); } }
function restart(){ startGame(); }

// load everything and start animation
async function boot(){ // load images
  playerImg = await loadImage(assets.player);
  for(const s of assets.enemies){ const i = await loadImage(s); enemyImgs.push(i); }
  engineSnd = loadAudio(assets.sounds.engine); crashSnd = loadAudio(assets.sounds.crash); dingSnd = loadAudio(assets.sounds.ding); clickSnd = loadAudio(assets.sounds.click);
  // set initial car position
  car.x = laneX[car.lane];
  // animation loop
  function frame(){ update(); draw(); requestAnimationFrame(frame); }
  frame();
}
boot();

// expose tuning in console (optional)
window.__game = {spawnEnemy, obstacles, explodeAt};

</script></body>
</html>
